// Lucideアイコンを React コンポーネント化するヘルパー
function makeIcon(name) {
  return function IconComponent(props) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      if (ref.current && window.lucide) {
        ref.current.innerHTML = '';
        const el = document.createElement('i');
        el.setAttribute('data-lucide', name);
        const size = props.size || 16;
        el.setAttribute('width', size);
        el.setAttribute('height', size);
        if (props.fill) el.setAttribute('fill', props.fill);
        if (props.stroke) el.setAttribute('stroke', props.stroke);
        ref.current.appendChild(el);
        window.lucide.createIcons();
      }
    }, [props.size, props.fill, props.stroke]);
    return h('span', {
      ref,
      style: {
        display: 'inline-flex',
        alignItems: 'center',
        justifyContent: 'center',
        verticalAlign: props.style?.verticalAlign,
        ...props.style,
      },
      className: props.className,
    });
  };
}

// localStorage を使った永続化フック
function useLocalStorage(key, initial) {
  const [value, setValue] = useState(() => {
    try {
      const stored = localStorage.getItem(key);
      if (stored) return JSON.parse(stored);
    } catch (e) {}
    return initial;
  });

  useEffect(() => {
    try {
      localStorage.setItem(key, JSON.stringify(value));
    } catch (e) {
      console.error('localStorage save failed', e);
    }
  }, [key, value]);

  return [value, setValue];
}

function useFavorites() {
  const [favorites, setFavorites] = useLocalStorage(FAV_KEY, []);

  const isFavorited = useCallback((id) => favorites.some(f => f.id === id), [favorites]);

  const toggle = useCallback((item) => {
    setFavorites(prev => {
      const exists = prev.some(f => f.id === item.id);
      return exists ? prev.filter(f => f.id !== item.id) : [{ ...item, savedAt: Date.now() }, ...prev];
    });
  }, [setFavorites]);

  const remove = useCallback((id) => setFavorites(prev => prev.filter(f => f.id !== id)), [setFavorites]);
  const clearAll = useCallback(() => setFavorites([]), [setFavorites]);

  const addCustom = useCallback((customItem) => {
    const item = {
      id: `custom:${Date.now()}:${Math.random().toString(36).slice(2, 8)}`,
      type: 'custom',
      name: customItem.name,
      url: customItem.url,
      source: '個別リスト',
      savedAt: Date.now(),
    };
    setFavorites(prev => [item, ...prev]);
    return item;
  }, [setFavorites]);

  return { favorites, isFavorited, toggle, remove, clearAll, addCustom };
}

function useHistory() {
  const [history, setHistory] = useLocalStorage(HISTORY_KEY, []);

  const add = useCallback((entry) => {
    const item = {
      id: `donation:${Date.now()}:${Math.random().toString(36).slice(2, 8)}`,
      recipientName: entry.recipientName,
      itemName: entry.itemName || '',
      amount: entry.amount || 0,
      memo: entry.memo || '',
      url: entry.url || '',
      date: entry.date || Date.now(),
    };
    setHistory(prev => [item, ...prev]);
    return item;
  }, [setHistory]);

  const remove = useCallback((id) => setHistory(prev => prev.filter(h => h.id !== id)), [setHistory]);
  const clearAll = useCallback(() => setHistory([]), [setHistory]);

  const totalAmount = useMemo(() => history.reduce((s, h) => s + (Number(h.amount) || 0), 0), [history]);

  return { history, add, remove, clearAll, totalAmount };
}

            <button key={r.id} onClick={() => setActiveRegion(r.id)} style={{ padding: '6px 12px', borderRadius: '9999px', fontSize: '10px', whiteSpace: 'nowrap', background: activeRegion === r.id ? '#8b3a3a' : 'white', color: activeRegion === r.id ? 'white' : '#5a3a2a', border: '1px solid #e8dcc4', fontWeight: activeRegion === r.id ? 700 : 500 }}>
              {r.label}
            </button>
          ))}
        </div>
      </section>

      <section className="px-4 mt-4">
        {Object.keys(grouped).length === 0 ? (
          <div className="text-center py-16">
            <div style={{ fontSize: '36px', marginBottom: '12px', opacity: 0.3 }}>🍃</div>
            <div style={{ fontSize: '12px', color: '#7a5a3a' }}>該当する都道府県が見つかりません</div>
          </div>
        ) : (
          REGIONS.filter(r => grouped[r]).map(region => (
            <div key={region} className="mb-6">
              <div className="flex items-center gap-2 mb-2.5">
                <div className="flex-1" style={{ height: '1px', background: '#e8dcc4' }} />
                <div style={{ fontSize: '10px', fontWeight: 700, letterSpacing: '0.2em', color: '#8b3a3a' }}>{region}</div>
                <div className="flex-1" style={{ height: '1px', background: '#e8dcc4' }} />
              </div>
              <div className="grid grid-cols-2 gap-2">
                {grouped[region].map(pref => (
                  <button key={pref.en} onClick={() => setSelected(pref)} className="relative p-3 rounded-xl text-left active:scale-[0.97] transition-transform" style={{ background: 'white', border: '1px solid #e8dcc4' }}>
                    {pref.popular && (
                      <div className="absolute" style={{ top: '6px', right: '6px', width: '6px', height: '6px', borderRadius: '9999px', background: '#d4a373' }} />
                    )}
                    <div style={{ fontWeight: 700, fontSize: '14px', marginBottom: '2px', color: '#3a2a1a' }}>{pref.jp}</div>
                    <div className="flex items-center justify-between">
                      <div style={{ fontSize: '9px', letterSpacing: '0.1em', opacity: 0.6, color: '#5a3a2a' }}>{pref.en.toUpperCase()}</div>
                      <ChevronRight size={12} stroke="#8b3a3a" />
                    </div>
                  </button>
                ))}
              </div>
            </div>
          ))
        )}
      </section>

      <footer className="mt-8 px-5 py-6 text-center">
        <div style={{ fontSize: '10px', lineHeight: 1.6, color: '#a08870' }}>
          掲載情報は外部サイトへのリンクをまとめたものです<br/>
          最新の情報は各リンク先でご確認ください
        </div>
      </footer>

      {selected && <PrefectureModal pref={selected} onClose={() => setSelected(null)} onShowGuide={() => { setSelected(null); setShowGuide(true); }} fav={fav} />}
      {showInfo && <InfoModal onClose={() => setShowInfo(false)} />}
      {showGuide && <GuideModal onClose={() => setShowGuide(false)} />}
      {showFavorites && <FavoritesModal favorites={fav.favorites} onRemove={fav.remove} onClearAll={fav.clearAll} onAddCustom={fav.addCustom} onDonate={openDonateDialog} onClose={() => setShowFavorites(false)} />}
      {showHistory && <HistoryModal history={hist.history} totalAmount={hist.totalAmount} onRemove={hist.remove} onClearAll={hist.clearAll} onClose={() => setShowHistory(false)} />}
      {donateTarget && <DonateRecordModal target={donateTarget} onSave={(entry) => { hist.add(entry); setDonateTarget(null); }} onClose={() => setDonateTarget(null)} />}
    </div>
  );
}

function LinkCardWithFav({ href, badge, badgeColor, title, desc, isFav, onToggleFav, dark }) {
  return (
    <div className="relative">
      <a href={href} target="_blank" rel="noopener noreferrer" className="block active:scale-[0.98] transition-transform" style={{ padding: '16px 48px 16px 16px', borderRadius: '16px', background: dark ? dark.bg : 'white', color: dark ? 'white' : undefined, border: dark ? 'none' : '1px solid #e8dcc4', boxShadow: '0 1px 3px rgba(139, 58, 58, 0.04)' }}>
        <div className="flex items-start justify-between gap-3">
          <div className="flex-1 min-w-0">
            {badge && (
              <div className="flex items-center gap-1.5 mb-1">
                <span style={{ fontSize: '9px', fontWeight: 700, letterSpacing: '0.1em', padding: '2px 6px', borderRadius: '2px', background: dark ? 'rgba(255,255,255,0.2)' : badgeColor, color: 'white' }}>{badge}</span>
              </div>
            )}
            <div style={{ fontWeight: 700, fontSize: '13px', marginBottom: '4px', lineHeight: 1.3, color: dark ? 'white' : '#3a2a1a' }}>{title}</div>
            <div style={{ fontSize: '11px', lineHeight: 1.6, color: dark ? 'rgba(255,255,255,0.85)' : '#7a5a3a' }}>{desc}</div>
          </div>
          <div style={{ flexShrink: 0, marginTop: '2px', opacity: dark ? 0.85 : 1 }}>
            <ExternalLink size={14} stroke={dark ? 'white' : '#8b3a3a'} />
          </div>
        </div>
      </a>

      <button onClick={(e) => { e.stopPropagation(); onToggleFav(); }} className="absolute active:scale-90 transition-transform" style={{ top: '12px', right: '12px', width: '32px', height: '32px', borderRadius: '9999px', display: 'flex', alignItems: 'center', justifyContent: 'center', background: isFav ? '#d4a373' : (dark ? 'rgba(255,255,255,0.15)' : 'rgba(139,58,58,0.06)') }} aria-label={isFav ? 'お気に入りから削除' : 'お気に入りに追加'}>
        <Bookmark size={13} fill={isFav ? '#3a2a1a' : 'none'} stroke={isFav ? '#3a2a1a' : (dark ? 'white' : '#8b3a3a')} />
      </button>
    </div>
  );
}

  const prefLinks = [
    { id: `pref:${pref.en}:kodomote`, type: 'pref', pref: pref.jp, source: 'こどものて', name: `${pref.jp}の児童養護施設一覧`, desc: '児童養護施設・子ども支援団体に特化した都道府県別まとめ', url: kodomoTeUrl, dark: { bg: 'linear-gradient(135deg, #5a7a4a 0%, #4a6a3a 100%)' } },

    { id: `pref:${pref.en}:amazon-top`, type: 'pref', pref: pref.jp, source: 'Amazon 公式', name: 'みんなで応援プログラム', desc: '全カテゴリ・全国の登録応援先トップページ', url: amazonOuenUrl },
    { id: `pref:${pref.en}:google`, type: 'pref', pref: pref.jp, source: 'Google検索', name: `${pref.jp}の関連情報`, desc: '応援先の公式サイトや個別のほしい物リストを横断検索', url: googleSearchUrl },

        </div>
        <h2 style={{ fontSize: '24px', fontWeight: 700, marginBottom: '2px' }}>{pref.jp}</h2>
        <div style={{ fontSize: '10px', letterSpacing: '0.2em', opacity: 0.6 }}>{pref.en.toUpperCase()}</div>

      <div className="flex-1 overflow-y-auto p-4">

            <MessageCircle size={14} stroke="#8b6534" />
            <div style={{ fontSize: '11px', fontWeight: 700, color: '#5a3a2a' }}>リストを開く前に：選び方のコツ</div>
          </div>
          <ChevronRight size={12} stroke="#8b6534" />

        <div style={{ fontSize: '10px', fontWeight: 700, letterSpacing: '0.2em', marginBottom: '10px', color: '#8b3a3a' }}>
          ━ 確認できる主なリスト ━
        </div>
        <div style={{ fontSize: '10px', marginBottom: '12px', lineHeight: 1.6, color: '#7a5a3a' }}>

function FavoritesModal({ favorites, onRemove, onClearAll, onAddCustom, onDonate, onClose }) {
  const [confirmClear, setConfirmClear] = useState(false);
  const [showAddForm, setShowAddForm] = useState(false);
  const [formName, setFormName] = useState('');
  const [formUrl, setFormUrl] = useState('');
  const [formError, setFormError] = useState('');

  const grouped = useMemo(() => ({
    customs: favorites.filter(f => f.type === 'custom'),
    hubs: favorites.filter(f => f.type === 'hub'),
    prefs: favorites.filter(f => f.type === 'pref'),
  }), [favorites]);

  const handleAdd = () => {
    setFormError('');
    const name = formName.trim();
    const url = formUrl.trim();
    if (!name) { setFormError('応援先の名前を入力してください'); return; }
    if (!url) { setFormError('URLを入力してください'); return; }
    if (!/^https?:\/\//i.test(url)) { setFormError('URLは http:// か https:// で始めてください'); return; }
    onAddCustom({ name, url });
    setFormName(''); setFormUrl(''); setShowAddForm(false);
  };

  const handleCancel = () => { setFormName(''); setFormUrl(''); setFormError(''); setShowAddForm(false); };

  return (
    <ModalShell onClose={onClose}>
      <div className="relative px-5 pt-6 pb-5" style={{ background: 'linear-gradient(135deg, #d4a373 0%, #b88a5c 100%)', color: '#faf6ee' }}>
        <CloseButton onClose={onClose} />
        <div className="flex items-center gap-1.5 mb-2" style={{ opacity: 0.9 }}>
          <Bookmark size={12} fill="#faf6ee" stroke="#faf6ee" />
          <div style={{ fontSize: '10px', letterSpacing: '0.2em', fontWeight: 700 }}>FAVORITES</div>
        </div>
        <h2 style={{ fontSize: '20px', fontWeight: 700, marginBottom: '4px', lineHeight: 1.2 }}>お気に入り</h2>
        <div style={{ fontSize: '11px', opacity: 0.85, lineHeight: 1.6 }}>
          {favorites.length === 0 ? '気になるリンクをここに保存できます' : `${favorites.length}件のリンクを保存中`}
        </div>
      </div>

      <div className="flex-1 overflow-y-auto p-4">
        {!showAddForm ? (
          <button onClick={() => setShowAddForm(true)} className="w-full mb-4 p-3 rounded-2xl flex items-center justify-center gap-2 active:scale-[0.98] transition-transform" style={{ background: 'white', border: '1.5px dashed #d4a373', color: '#8b3a3a' }}>
            <Plus size={14} />
            <span style={{ fontSize: '12px', fontWeight: 700 }}>気に入った個別リストを追加</span>
          </button>
        ) : (
          <div className="mb-4 p-4 rounded-2xl" style={{ background: 'white', border: '1px solid #d4a373' }}>
            <div style={{ fontSize: '11px', fontWeight: 700, marginBottom: '4px', color: '#3a2a1a' }}>個別の応援先を追加</div>
            <div style={{ fontSize: '10px', marginBottom: '12px', lineHeight: 1.6, color: '#7a5a3a' }}>
              Amazonで気に入った応援先のリストURLと名前を貼り付けてください
            </div>

            <div className="mb-2">
              <label style={{ fontSize: '10px', fontWeight: 700, display: 'block', marginBottom: '4px', color: '#5a3a2a' }}>応援先の名前</label>
              <input type="text" value={formName} onChange={(e) => setFormName(e.target.value)} placeholder="例: NPO法人キッズウィル" className="w-full" style={{ padding: '8px 12px', fontSize: '12px', borderRadius: '8px', outline: 'none', background: '#faf6ee', border: '1px solid #e8dcc4', fontFamily: 'inherit', color: '#3a2a1a' }} />
            </div>

            <div className="mb-3">
              <label style={{ fontSize: '10px', fontWeight: 700, display: 'block', marginBottom: '4px', color: '#5a3a2a' }}>リストのURL</label>
              <input type="url" value={formUrl} onChange={(e) => setFormUrl(e.target.value)} placeholder="https://www.amazon.co.jp/..." className="w-full" style={{ padding: '8px 12px', fontSize: '11px', borderRadius: '8px', outline: 'none', background: '#faf6ee', border: '1px solid #e8dcc4', fontFamily: 'monospace', color: '#3a2a1a' }} />
            </div>

            {formError && (
              <div className="mb-2 p-2 rounded-lg" style={{ fontSize: '10px', background: '#fbe8d3', color: '#8b3a3a' }}>{formError}</div>
            )}

            <div className="flex gap-2">
              <button onClick={handleCancel} className="flex-1" style={{ padding: '8px 0', fontSize: '11px', borderRadius: '9999px', background: '#faf6ee', color: '#5a3a2a' }}>キャンセル</button>
              <button onClick={handleAdd} className="flex-1" style={{ padding: '8px 0', fontSize: '11px', fontWeight: 700, borderRadius: '9999px', background: '#8b3a3a', color: 'white' }}>追加する</button>
            </div>
          </div>
        )}

        {favorites.length === 0 ? (
          <div className="text-center py-8">
            <div style={{ fontSize: '36px', marginBottom: '12px', opacity: 0.3 }}>📑</div>
            <div style={{ fontSize: '14px', fontWeight: 700, marginBottom: '8px', color: '#5a3a2a' }}>まだお気に入りがありません</div>
            <div style={{ fontSize: '11px', lineHeight: 1.6, padding: '0 24px', color: '#7a5a3a' }}>
              各リンクの<Bookmark size={11} style={{ display: 'inline-flex', margin: '0 4px', verticalAlign: '-1px' }} />ボタンから保存するか、上の「+」から個別リストを追加できます。
            </div>
          </div>
        ) : (
          <>
            {grouped.customs.length > 0 && <FavoriteGroup title="個別リスト" items={grouped.customs} onRemove={onRemove} onDonate={onDonate} />}
            {grouped.hubs.length > 0 && <FavoriteGroup title="メインリソース" items={grouped.hubs} onRemove={onRemove} onDonate={onDonate} />}
            {grouped.prefs.length > 0 && <FavoriteGroup title="都道府県別" items={grouped.prefs} onRemove={onRemove} onDonate={onDonate} />}

            <div className="mt-6 pt-4" style={{ borderTop: '1px solid #e8dcc4' }}>
              {!confirmClear ? (
                <button onClick={() => setConfirmClear(true)} className="w-full" style={{ padding: '10px 0', fontSize: '11px', fontWeight: 700, borderRadius: '9999px', color: '#8b3a3a', background: 'transparent', border: '1px solid #e8dcc4' }}>
                  すべてのお気に入りを削除
                </button>
              ) : (
                <div className="p-3 rounded-xl" style={{ background: 'white', border: '1px solid #e8c993' }}>
                  <div style={{ fontSize: '11px', marginBottom: '10px', fontWeight: 700, textAlign: 'center', color: '#5a3a2a' }}>本当にすべて削除しますか？</div>
                  <div className="flex gap-2">
                    <button onClick={() => setConfirmClear(false)} className="flex-1" style={{ padding: '8px 0', fontSize: '11px', borderRadius: '9999px', background: '#faf6ee', color: '#5a3a2a' }}>キャンセル</button>
                    <button onClick={() => { onClearAll(); setConfirmClear(false); }} className="flex-1" style={{ padding: '8px 0', fontSize: '11px', fontWeight: 700, borderRadius: '9999px', background: '#8b3a3a', color: 'white' }}>削除する</button>
                  </div>
                </div>
              )}
            </div>
          </>
        )}
      </div>
    </ModalShell>
  );
}

function FavoriteGroup({ title, items, onRemove, onDonate }) {

    <div className="mb-5">
      <div style={{ fontSize: '10px', fontWeight: 700, letterSpacing: '0.2em', marginBottom: '10px', color: '#8b3a3a' }}>━ {title} ━</div>
      <div className="space-y-2">
        {items.map(item => <FavoriteItem key={item.id} item={item} onRemove={onRemove} onDonate={onDonate} />)}
      </div>

    <div className="relative p-3 rounded-xl" style={{ background: 'white', border: '1px solid #e8dcc4' }}>
      <button onClick={() => onRemove(item.id)} className="absolute active:scale-90" style={{ top: '8px', right: '8px', width: '28px', height: '28px', borderRadius: '9999px', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(139,58,58,0.06)' }} aria-label="削除">
        <Trash2 size={11} stroke="#8b3a3a" />
      </button>

      <a href={item.url} target="_blank" rel="noopener noreferrer" className="block" style={{ paddingRight: '36px' }}>
        <div className="flex items-center gap-1.5 mb-1 flex-wrap">
          {item.type === 'pref' && (
            <span style={{ fontSize: '9px', fontWeight: 700, padding: '2px 6px', borderRadius: '2px', background: '#fbe8d3', color: '#8b3a3a' }}>{item.pref}</span>
          )}
          <span style={{ fontSize: '9px', letterSpacing: '0.1em', color: '#7a5a3a' }}>{item.source || item.badge}</span>
        </div>
        <div style={{ fontWeight: 700, fontSize: '12px', lineHeight: 1.3, marginBottom: '4px', color: '#3a2a1a' }}>{item.name}</div>

      <button onClick={() => onDonate(item)} className="mt-2.5 w-full active:scale-[0.98]" style={{ padding: '6px 12px', borderRadius: '9999px', fontSize: '10px', fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px', background: '#5a7a4a', color: 'white' }}>
        <Gift size={11} />
        寄付した記録を残す
      </button>
    </div>

function DonateRecordModal({ target, onSave, onClose }) {
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

  const [recipient, setRecipient] = useState(target.recipientName || '');
  const [date, setDate] = useState(todayStr);
  const [itemName, setItemName] = useState('');
  const [amount, setAmount] = useState('');
  const [memo, setMemo] = useState('');
  const [error, setError] = useState('');

  const handleSave = () => {
    setError('');
    if (!recipient.trim()) { setError('寄付先を入力してください'); return; }
    if (!date) { setError('日付を選択してください'); return; }
    onSave({
      recipientName: recipient.trim(),
      date: new Date(date + 'T00:00:00').getTime(),
      itemName: itemName.trim(),
      amount: Number(amount) || 0,
      memo: memo.trim(),
      url: target.url || '',
    });
  };

  return (
    <ModalShell onClose={onClose} zIndex={60}>
      <div className="relative px-5 pt-6 pb-4" style={{ background: 'linear-gradient(135deg, #5a7a4a 0%, #4a6a3a 100%)', color: '#faf6ee' }}>
        <CloseButton onClose={onClose} />
        <div className="flex items-center gap-1.5 mb-2" style={{ opacity: 0.9 }}>
          <Gift size={12} />
          <div style={{ fontSize: '10px', letterSpacing: '0.2em', fontWeight: 700 }}>RECORD A DONATION</div>
        </div>
        <h2 style={{ fontSize: '20px', fontWeight: 700, marginBottom: '4px', lineHeight: 1.2 }}>寄付の記録</h2>
        <div style={{ fontSize: '11px', opacity: 0.85 }}>あなたの応援を記録に残しましょう</div>
      </div>

      <div className="flex-1 overflow-y-auto p-4 space-y-3">
        <FormField label="寄付先" required>
          <input type="text" value={recipient} onChange={(e) => setRecipient(e.target.value)} className="w-full" style={inputStyle} />
        </FormField>
        <FormField label="寄付した日" required>
          <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full" style={inputStyle} />
        </FormField>
        <FormField label="贈った商品名">
          <input type="text" value={itemName} onChange={(e) => setItemName(e.target.value)} placeholder="例: 折りたたみ自転車" className="w-full" style={inputStyle} />
        </FormField>
        <FormField label="金額（円）">
          <input type="number" inputMode="numeric" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="例: 17980" min="0" className="w-full" style={inputStyle} />
        </FormField>
        <FormField label="メモ（任意）">
          <textarea value={memo} onChange={(e) => setMemo(e.target.value)} placeholder="例: クリスマスプレゼントに / 自転車に乗れない子のために" rows={3} className="w-full" style={{ ...inputStyle, fontSize: '11px', resize: 'none' }} />
        </FormField>

        {error && (
          <div className="p-2 rounded-lg" style={{ fontSize: '10px', background: '#fbe8d3', color: '#8b3a3a' }}>{error}</div>
        )}

        <div className="flex gap-2 pt-2">

function FormField({ label, required, children }) {

function HistoryModal({ history, totalAmount, onRemove, onClearAll, onClose }) {
  const [confirmClear, setConfirmClear] = useState(false);

  const grouped = useMemo(() => {
    const g = {};
    history.forEach(h => {
      const d = new Date(h.date);
      const key = `${d.getFullYear()}年${d.getMonth() + 1}月`;
      if (!g[key]) g[key] = [];
      g[key].push(h);
    });
    return g;
  }, [history]);

  const formatYen = (n) => (Number(n) || 0).toLocaleString('ja-JP');

  return (
    <ModalShell onClose={onClose}>
      <div className="relative px-5 pt-6 pb-5" style={{ background: 'linear-gradient(135deg, #5a7a4a 0%, #4a6a3a 100%)', color: '#faf6ee' }}>
        <CloseButton onClose={onClose} />
        <div className="flex items-center gap-1.5 mb-2" style={{ opacity: 0.9 }}>
          <History size={12} />
          <div style={{ fontSize: '10px', letterSpacing: '0.2em', fontWeight: 700 }}>DONATION HISTORY</div>
        </div>
        <h2 style={{ fontSize: '20px', fontWeight: 700, marginBottom: '8px', lineHeight: 1.2 }}>寄付の履歴</h2>

        {history.length > 0 && (
          <div className="flex gap-3 mt-3">
            <div className="flex-1 p-2.5 rounded-xl" style={{ background: 'rgba(250, 246, 238, 0.15)', border: '1px solid rgba(250, 246, 238, 0.25)' }}>
              <div style={{ fontSize: '9px', opacity: 0.8, marginBottom: '2px' }}>記録した寄付</div>
              <div style={{ fontSize: '16px', fontWeight: 700 }}>{history.length}件</div>
            </div>
            <div className="flex-1 p-2.5 rounded-xl" style={{ background: 'rgba(250, 246, 238, 0.15)', border: '1px solid rgba(250, 246, 238, 0.25)' }}>
              <div style={{ fontSize: '9px', opacity: 0.8, marginBottom: '2px' }}>合計金額</div>
              <div style={{ fontSize: '16px', fontWeight: 700 }}>¥{formatYen(totalAmount)}</div>
            </div>
          </div>
        )}
      </div>

      <div className="flex-1 overflow-y-auto p-4">
        {history.length === 0 ? (
          <div className="text-center py-12">
            <div style={{ fontSize: '36px', marginBottom: '12px', opacity: 0.3 }}>🎁</div>
            <div style={{ fontSize: '14px', fontWeight: 700, marginBottom: '8px', color: '#5a3a2a' }}>まだ記録がありません</div>
            <div style={{ fontSize: '11px', lineHeight: 1.6, padding: '0 24px', color: '#7a5a3a' }}>
              お気に入りから「寄付した記録を残す」ボタンで、あなたの応援を記録できます。
            </div>
          </div>
        ) : (
          <>
            {Object.keys(grouped).map(monthKey => (
              <div key={monthKey} className="mb-5">
                <div style={{ fontSize: '10px', fontWeight: 700, letterSpacing: '0.2em', marginBottom: '10px', color: '#8b3a3a' }}>━ {monthKey} ━</div>
                <div className="space-y-2">
                  {grouped[monthKey].map(h => <HistoryItem key={h.id} entry={h} onRemove={onRemove} formatYen={formatYen} />)}
                </div>
              </div>
            ))}

            <div className="mt-6 pt-4" style={{ borderTop: '1px solid #e8dcc4' }}>
              {!confirmClear ? (
                <button onClick={() => setConfirmClear(true)} className="w-full" style={{ padding: '10px 0', fontSize: '11px', fontWeight: 700, borderRadius: '9999px', color: '#8b3a3a', background: 'transparent', border: '1px solid #e8dcc4' }}>
                  すべての履歴を削除
                </button>
              ) : (
                <div className="p-3 rounded-xl" style={{ background: 'white', border: '1px solid #e8c993' }}>
                  <div style={{ fontSize: '11px', marginBottom: '10px', fontWeight: 700, textAlign: 'center', color: '#5a3a2a' }}>本当にすべて削除しますか？</div>
                  <div className="flex gap-2">
                    <button onClick={() => setConfirmClear(false)} className="flex-1" style={{ padding: '8px 0', fontSize: '11px', borderRadius: '9999px', background: '#faf6ee', color: '#5a3a2a' }}>キャンセル</button>
                    <button onClick={() => { onClearAll(); setConfirmClear(false); }} className="flex-1" style={{ padding: '8px 0', fontSize: '11px', fontWeight: 700, borderRadius: '9999px', background: '#8b3a3a', color: 'white' }}>削除する</button>
                  </div>
                </div>
              )}
            </div>
          </>
        )}
      </div>
    </ModalShell>
  );
}

function HistoryItem({ entry, onRemove, formatYen }) {
  const d = new Date(entry.date);
  const dateStr = `${d.getMonth() + 1}/${d.getDate()}`;

  return (
    <div className="relative p-3 rounded-xl" style={{ background: 'white', border: '1px solid #e8dcc4' }}>
      <button onClick={() => onRemove(entry.id)} className="absolute active:scale-90" style={{ top: '8px', right: '8px', width: '28px', height: '28px', borderRadius: '9999px', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(139,58,58,0.06)' }} aria-label="削除">
        <Trash2 size={11} stroke="#8b3a3a" />
      </button>

      <div style={{ paddingRight: '36px' }}>
        <div className="flex items-center gap-2 mb-1.5">
          <div style={{ fontSize: '9px', fontWeight: 700, padding: '2px 6px', borderRadius: '2px', background: '#5a7a4a', color: 'white' }}>{dateStr}</div>
          <div style={{ fontWeight: 700, fontSize: '12px', lineHeight: 1.3, flex: 1, color: '#3a2a1a' }}>{entry.recipientName}</div>
        </div>

        {entry.itemName && (
          <div className="flex items-baseline gap-2" style={{ fontSize: '11px', marginBottom: '4px', color: '#5a4a3a' }}>
            <span style={{ color: '#7a5a3a' }}>商品:</span>
            <span>{entry.itemName}</span>
          </div>
        )}

        {Number(entry.amount) > 0 && (
          <div className="flex items-baseline gap-2" style={{ fontSize: '11px', marginBottom: '4px', color: '#5a4a3a' }}>
            <span style={{ color: '#7a5a3a' }}>金額:</span>
            <span style={{ fontWeight: 700, color: '#8b3a3a' }}>¥{formatYen(entry.amount)}</span>
          </div>
        )}

        {entry.memo && (
          <div className="mt-2 p-2 rounded-lg" style={{ fontSize: '10px', lineHeight: 1.6, fontStyle: 'italic', background: '#fbe8d3', color: '#5a3a2a' }}>
            "{entry.memo}"
          </div>
        )}

        {entry.url && (
          <a href={entry.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1 mt-2" style={{ fontSize: '10px', color: '#8b3a3a' }}>
            <ExternalLink size={9} />
            リストを開く
          </a>
        )}
      </div>
    </div>
  );
}
